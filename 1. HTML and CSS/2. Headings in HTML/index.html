<!--! Headings in HTML -->
<!-- Heading was crucial and important part of our document in html we have headings tag to use give heading or subheading to our document there was six type of heading in html -->
<!DOCTYPE html>
<html>
  <head>
    <title>Headings in HTML</title>
  </head>
  <body>
    <!--! With the help of h1 tag we give heading in our html document the h1 tag was the main or title heading of our webpage it was only one per page. -->
    <!--* There was Six type of Headings in HTML  -->
    <!-- Let we see heading tags one by one from h1 to h6 -->
    <h1>Heading One</h1>
    <!--? heading tag was also opening-closing tag this h1 tag was the main heading in our html document  -->
    <!--! h1 heading was the biggest and boldest heading and it was the main heading in our html document. -->
    <!--* After h1 heading all the headings tag was used for sub-heading -->
    <h2>Heading Two</h2>
    <!--? heading tag was the second level heading in our html document and used for sub-heading and it was smaller than h1 , less thicker and bolder. -->
    <h3>Heading Three</h3>
    <!--? Heading tag was the third level heading in our html document and used for also sub-heading and it was smaller than h2 , less thicker and bolder. -->
    <h4>Heading Four</h4>
    <!--? Heading tag was the fourth level heading in our html document and used for also sub-heading and it was smaller , less thicker and bolder than  h3 heading. -->
    <h5>Heading Five</h5>
    <!--? Heading tag was the fifth level heading in our html document and used sub-heading and it was smaller , less thicker and bolder than h4 heading. -->
    <h6>Heading Six</h6>
    <!--? Heading tag was the Sixth level and smallest heading among all heading tag and least used heading tag in our.  -->
    <!--! In Heading tag the h1 was most important and biggest , boldest and thickest tag in html and h6 was the smallest and least used tag in html. -->
    <!--* In HTML we have heading only from h1 to h6 not after h7 -->
  </body>
</html>
