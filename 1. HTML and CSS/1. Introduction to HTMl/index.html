<!--! What is HTML ?  -->
<!--* HTML was Standard Markup language to create Webpages. -->
<!--* HTML Stands for Hyper Text Markup Language. -->
<!--* HTML used to Describe the Structure of web-pages. -->

<!--! Structure of HTML  -->
<!-- Let see structure of HTML -->
<!DOCTYPE html>
<!--! This <! Doctype html> was Document Type Declaration which was also known as "DTD" specially used for HTML5 this HTML5 was html 5th version which allow us to put audio and video inside our browser -->
<!--* After this Document declaration our HTML code starts with html tag -->
<!-- This <html> was the opening tag -->
<html>
  <!--? Inside this html tag there was head tag -->
  <!-- This head tag was also have opening tag <head> and closing tag </head> -->
  <head>
    <!--* Inside this head tag there was title tag  -->
    <title>Learning Frontend Development</title>
    <!-- This title tag content was seen on the browser tab -->
  </head>
  <!--! This head tag was used to kept meta-data of our web-site or web-page , title tag , linking css and javascript file was also done inside head tag only and also third party file was also link inside head only. This head tag was also example of opening tag and closing tag. -->
  <!--? Inside this html tag we have another tag was body tag -->
  <!-- This body also have opening tag <body> and closing tag </body> -->
  <body>
    <!--* Whatever we write inside this body tag was render on the device screen or device viewport -->
    <!-- Let's see example of it-->
    My name is Aayush Vyas iam learning Frontend Development.
  </body>
  <!--! Inside body tag we actually define the structure of our webpage whatever we thing write inside the body tag was render on our device screen in browser and body tag was also opening-closing tag example -->
</html>
<!-- This </html> was the closing tag -->
<!--! This html tag was entry point of our html document it was also called "root tag" or "root container" because every html tag was we write inside this html tag  -->

<!--? HTML Tag of two types  -->
<!--* 1st.) Opening tag and closing tag :- This html tags need both opening tag and as well closing tag to close our html tag the examples are html tag head tag and body tag etc. -->
<!--* 2nd.) Self-closing tag or empty tag or non-closing tag :- This type of html tags don't required not closing tags it was close by it's self. -->
