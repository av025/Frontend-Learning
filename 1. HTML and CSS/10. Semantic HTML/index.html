<!DOCTYPE html>
<html>
  <head>
    <title>Semantic HTML</title>
  </head>
  <body>
    <h1>Semantic HTML</h1>
    <!--* Semantic HTML  :  Semantic Html tags are those tag which carry some meanings this semantic html was also helpful for both developers to understand html document and    -->
    <!-- Let see example of semantic tags  -->
    <header>
      <!--! This Header tag was the example of semantic html inside this header tag we create header of our website adding logo , adding nav-links of our website.  -->

      <nav>
        <!--! This nav Semantic tag was used to add navigation or to create navbar -->
      </nav>
    </header>
    <main>
      <!--! This main tag was also example of semantic html inside we write our whole content of web-applications so we say "body of our web-page"-->

      <section>
        <!--! This section Semantic tag was used to divide our html document or webpage content in sections. -->
      </section>

      <article>
        <!--! We used this article semantic tag used for article. -->
      </article>
    </main>
    <footer>
      <!--! This footer tag was also used to create footer our webpage for example adding nav-links , copy-right and details of bussiness etc. are written inside this footer tag. -->
    </footer>
  </body>
</html>
