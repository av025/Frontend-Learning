<!DOCTYPE html>
<html>
  <head>
    <title>Audio and Video in HTML</title>
  </head>
  <style>
    video {
      width: 600px;
    }
  </style>
  <body>
    <h1>Audio and Video in HTML</h1>
    <!--* With the help of audio or video tag we can insert audio and video in our html document. -->

    <h2>Video Tag in HTML</h2>
    <!--? Video tag  -->
    <!-- With the help of video tag we can insert the video in our html document or web-page. -->
    <video src="./source/12098259_3840_2160_30fps.mp4" controls></video>
    <!--* In video tag we have src attribute in which we give path of our video  -->
    <!--! The video we insert was in full size so with the help of css and width and height tag we can shrink it's size but it same like the image insert same like that. -->
    <!--* To play the video we can use the controls attribute to start , play , pause etc our video -->
    <h2>Audio Tag in HTML</h2>
    <!--? Audio tag -->
    <audio
      src="./source/Bairiyaa Re_320(PagalWorld.com.sb).mp3"
      controls
    ></audio>
    <!--* With the help of audio tag we can insert audio in our html document or web page and in audio tag we have src attribute where we can insert our audio.
     -->
  </body>
</html>
