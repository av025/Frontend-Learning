<!DOCTYPE html>
<html>
  <head>
    <title>More Inputs Fields in HTML Forms</title>
  </head>
  <body>
    <h1>Type of Inputs Fields in Form Tag in HTML</h1>
    <form action="#">
      <!--* Text type input tag -->
      <label for="first-name">First Name :</label>
      <input type="text" id="first-name" />
      <label for="last-name">Last Name :</label>
      <input type="text" id="last-name" />

      <!--* Email type input tag -->
      <label for="email">Email :</label>
      <input type="email" id="email" />

      <!--* Password Type input tag -->
      <label for="password">Password :</label>
      <input type="password" id="password" />

      <!--* Button type input tag -->
      <!--? submit type input field -->
      <input type="submit" value="Save" />
      <!--* This submit type input filed used to submit user data and "value" attribute used to give value or title to our input  -->
      <!--? reset type input field -->
      <input type="reset" value="Reset" />
      <!--* With the help of this reset type input field we can reset our input fields data we type in our form -->
      <!--? button type input field -->
      <input type="button" value="Go to second page" />
      <!--* With the help of button type we can use this input type as normal button -->

      <!--? Similarly we have button tag also to use as button in html document. -->
      <button>This Button tag</button>
      <!--! Button tag was also opening-closing tag -->
      <br />
      <br />
      <!--? Checkbox type input tag -->
      <label for="terms-condition">I Accept all Terms and conditions</label>
      <input type="checkbox" id="terms-condition" />
      <!--* With the help of this input filed we can create checkbox in our webpage -->

      <!--? Color picker type input tag -->
      <input type="color" />
      <!--* With the help of this we can create color picker -->

      <!--? Date picker type input tag -->
      <label for="d-o-b">Date of Birth :</label>
      <input type="date" id="d-o-b" />
      <!--* With the help of this we can create date picker to choose date , month and year in year-month-date format -->

      <!--? file type input -->
      <input type="file" />
      <!--* With the help of file type we can select the files from our own machine or system. -->

      <!--? Number type input  -->
      <label for="age">Age :</label>
      <input type="number" id="age" />
      <!--* This number input filed was used to input numbers from the user and we can do increment and decrement with the help of small buttons to do in this input field -->

      <!--? Radio button type -->
      <input type="radio" />
      <!--* radio button was also checkbox but there was difference and it was when we select the radio button than we can't de-select or udo that it was select upto if we don't refresh our web-page. -->

      <!--? Range input type  -->
      <input type="range" />
      <!--* With the help of range input we can give range in our web-page. -->
    </form>
  </body>
</html>
