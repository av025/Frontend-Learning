<!DOCTYPE html>
<html>
  <head>
    <title>Non-Semantic HTML</title>
  </head>
  <body>
    <h1>Non-Semantic HTML</h1>
    <!--* The Non-semantic HTML was the elements which does not convey meaning let see the two most important methods in html documents. -->
    <!--! first non-semantic tag was div tag -->
    <div>
      <!--! This div tag means division it like empty container  -->
    </div>
    <!--! second non-semantic tag was span tag -->
    <span>
      <!--! This span tag was also empty container -->
    </span>

    <!--* div and span both are used as empty container but they both have some difference. -->
  </body>
</html>
