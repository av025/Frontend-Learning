<!DOCTYPE html>
<html>
  <head>
    <title>Images in HTML</title>
  </head>
  <body>
    <h1>Images in HTML</h1>
    <!--* To insert images in our HTML Document than we used img tag  -->
    <img src="" alt="" />
    <!--? img tag was used for to add images in our html document  and src was attribute with the help of we add the source of our image and alt was another attribute with the help of that we give alternate text -->
    <!--! img tag was self-closing tag example  -->
    <!--* We can used two types of images -->
    <!--? 1st.) Local Images :- -->
    <!-- The Local images are those images which was present in our folder in our machine that we embed to our img tag -->
    <img src="./source/download.jpeg" alt="background image" />
    <!--? 2nd.) Remote Images -->
    <!-- The Remote images which are present on over the internet  -->
    <img
      src="https://images.pexels.com/photos/28733656/pexels-photo-28733656/free-photo-of-elegant-portrait-of-woman-with-floral-headpiece-in-abuja.jpeg?auto=compress&cs=tinysrgb&w=600&lazy=load"
      alt="image from pixels"
    />
    <!--! With the help of height and width attribute we can control the size of our images in img tag -->
    <!-- Let see example of height and width attribute  -->
    <img
      src="https://images.pexels.com/photos/27777801/pexels-photo-27777801/free-photo-of-l-h-i-ca-phe-buon-ma-thu-t-2023.jpeg?auto=compress&cs=tinysrgb&w=600&lazy=load"
      alt="images from pixels"
      height="800"
      width="800"
    />
    <!--? Now with the help of height and width  attribute we can control size of images the default units was used was the pixels if we want to give we give that or otherwise we don't give default it considered as pixels -->
  </body>
</html>
